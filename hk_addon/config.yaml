# https://developers.home-assistant.io/docs/apps/configuration
name: HK Addon
version: "0.2.9"
slug: hk_addon
description: Steuerung der Hühnerklappe(n) über Home Assistant (Ingress-UI, Scheduler im Add-on)
url: "https://github.com/The88ers/ha-addon-hk-app"
arch:
  - aarch64
  - amd64
startup: application
# Docker-Init (tini) muss AUS sein, sonst ist nicht s6-/init PID 1 → "s6-overlay-suexec: can only run as pid 1"
# Siehe HA-Doku: init bei eigenem Init-System (s6-overlay im Base-Image) auf false setzen.
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:chicken
homeassistant_api: true
watchdog: http://[HOST]:[PORT:8099]/api/health
map:
  - share:rw
options: {}
schema: false
